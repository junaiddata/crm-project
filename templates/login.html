<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — CRM</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: #0f172a;
      background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 55%, #2563eb 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    .login-card {
      width: 100%; max-width: 380px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 36px 32px 30px;
    }

    .brand { text-align: center; margin-bottom: 26px; }
    .brand img { height: 44px; object-fit: contain; max-width: 170px; }
    .brand-title { font-size: 19px; font-weight: 800; color: #0f172a; margin-top: 14px; letter-spacing: -0.02em; }
    .brand-sub   { font-size: 12.5px; color: #64748b; margin-top: 3px; }

    .field { margin-bottom: 15px; }
    .field label {
      display: block; font-size: 11.5px; font-weight: 700; color: #475569;
      text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px;
    }
    .field input {
      width: 100%; height: 44px; padding: 0 14px;
      border: 1.5px solid #dde3ea; border-radius: 10px;
      font-size: 14px; font-family: inherit; color: #0f172a; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s; background: #fff;
    }
    .field input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.14); }

    .btn-submit {
      width: 100%; height: 46px; margin-top: 6px;
      border: none; border-radius: 10px; cursor: pointer;
      background: #2563eb; color: #fff;
      font-size: 14.5px; font-weight: 700; font-family: inherit;
      transition: background 0.15s;
    }
    .btn-submit:hover { background: #1d4ed8; }

    .alert {
      background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c;
      border-radius: 10px; padding: 11px 14px; font-size: 12.5px;
      margin-bottom: 18px; line-height: 1.45;
    }

    .foot { text-align: center; margin-top: 20px; font-size: 11.5px; color: #94a3b8; }
    .foot a { color: #2563eb; text-decoration: none; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="brand">
      <img src="https://junaidworld.com/wp-content/uploads/2023/09/footer-logo.png.webp"
           alt="Company Logo"
           style="filter: brightness(0) saturate(100%) invert(13%) sepia(94%) saturate(2878%) hue-rotate(220deg);"
           onerror="this.style.display='none'">
      <div class="brand-title">CRM Sign in</div>
      <div class="brand-sub">Leads · WhatsApp · Email · Calls</div>
    </div>

    {% if form.errors %}
    <div class="alert">Incorrect username or password. Please try again.</div>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <div class="field">
        <label for="id_username">Username</label>
        <input type="text" name="username" id="id_username" autocomplete="username" autofocus required>
      </div>
      <div class="field">
        <label for="id_password">Password</label>
        <input type="password" name="password" id="id_password" autocomplete="current-password" required>
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="btn-submit">Sign in</button>
    </form>

    <div class="foot">Authorized staff only · Junaid CRM</div>
  </div>

</body>
</html>
